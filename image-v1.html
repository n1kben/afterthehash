<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>afterthehash - Image</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #000;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 24px;
      }

      header {
        max-width: 600px;
        margin: 0 auto 60px;
        padding-bottom: 24px;
        border-bottom: 1px solid #1a1a1a;
      }

      header a {
        color: #e0e0e0;
        text-decoration: none;
        font-size: 20px;
        font-weight: 500;
        letter-spacing: 0.5px;
        transition: opacity 0.2s;
        font-family: "Courier New", monospace;
      }

      header a:hover {
        opacity: 0.7;
      }

      header a .bracket {
        color: #444;
      }

      header a .highlight {
        color: #fff;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      #app {
        max-width: 600px;
        margin: 0 auto;
      }

      /* Hide sections by default - will be shown via JS */
      #encrypt,
      #encrypt-create,
      #encrypt-success,
      #decrypt,
      #decrypt-locked,
      #decrypt-unlocked {
        display: none;
      }

      /* Show only the active state */
      #encrypt.active,
      #encrypt-create.active,
      #encrypt-success.active,
      #decrypt.active,
      #decrypt-locked.active,
      #decrypt-unlocked.active {
        display: block;
      }

      h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 24px;
        letter-spacing: -1px;
        color: #fff;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 14px 16px;
        background: #0a0a0a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        color: #e0e0e0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 15px;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #444;
      }

      input[type="text"]::placeholder,
      input[type="password"]::placeholder {
        color: #666;
      }

      input[type="text"]:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      input[type="file"] {
        width: 100%;
        padding: 14px 16px;
        background: #0a0a0a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        color: #999;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 14px;
        cursor: pointer;
        transition: border-color 0.2s;
      }

      input[type="file"]:focus {
        outline: none;
        border-color: #444;
      }

      input[type="file"]::file-selector-button {
        margin-right: 12px;
        padding: 8px 14px;
        background: #1a1a1a;
        color: #e0e0e0;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }

      input[type="file"]::file-selector-button:hover {
        background: #222;
      }

      button {
        padding: 14px 24px;
        background: #fff;
        color: #000;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      button:hover {
        opacity: 0.9;
      }

      button:active {
        opacity: 0.8;
      }

      .help-text {
        color: #999;
        font-size: 14px;
        margin-bottom: 8px;
      }

      .success-container {
        display: flex;
        gap: 12px;
      }

      .success-container input {
        flex: 1;
      }

      .success-container button {
        flex-shrink: 0;
      }

      .open-link {
        display: inline-block;
        margin-top: 12px;
        color: #61afef;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
      }

      .open-link:hover {
        text-decoration: underline;
      }

      .size-note {
        color: #e5c07b;
        font-size: 13px;
        margin-top: 12px;
        line-height: 1.5;
      }

      .size-note:empty {
        display: none;
      }

      #decrypt-locked-error {
        color: #ff6b6b;
        font-size: 14px;
        min-height: 20px;
      }

      .compress-panel {
        margin-top: 16px;
        padding: 16px;
        background: #0a0a0a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
      }

      .compress-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }

      .compress-row label {
        color: #999;
        font-size: 14px;
        width: 64px;
        flex-shrink: 0;
      }

      .compress-row input[type="range"] {
        flex: 1;
        min-width: 0;
        accent-color: #fff;
      }

      .compress-val {
        color: #e0e0e0;
        font-size: 13px;
        width: 56px;
        text-align: right;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }

      .compress-stats {
        color: #e0e0e0;
        font-size: 13px;
        margin-top: 4px;
        font-variant-numeric: tabular-nums;
      }

      .compress-status {
        font-size: 13px;
        margin-top: 10px;
        line-height: 1.5;
      }

      .compress-status:empty {
        display: none;
      }

      .compress-status.good {
        color: #98c379;
      }

      .compress-status.warn {
        color: #e5c07b;
      }

      .compress-status.bad {
        color: #ff6b6b;
      }

      .compress-note {
        color: #999;
        font-size: 13px;
        margin-top: 4px;
        line-height: 1.5;
      }

      .compress-note:empty {
        display: none;
      }

      /* Decrypted-image viewer — mirrors the browser's native image viewer:
         a black full-bleed surface with the image centered and scaled to fit
         the window. Clicking toggles full (native) size with pan/scroll. */
      .image-viewer {
        position: fixed;
        inset: 0;
        z-index: 10;
        background: #000;
        overflow: auto;
        display: flex;
        flex-direction: column;
        align-items: safe center;
        justify-content: safe center;
        gap: 24px;
      }

      .image-viewer:empty {
        display: none;
      }

      .image-viewer img {
        flex: none;
        display: block;
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
        object-fit: contain;
        cursor: zoom-in;
      }

      .image-viewer img.full {
        max-width: none;
        max-height: none;
        cursor: zoom-out;
      }

      @media (max-width: 768px) {
        body {
          padding: 20px 16px;
        }

        header {
          margin-bottom: 40px;
        }

        h1 {
          font-size: 28px;
          margin-bottom: 20px;
        }

        input[type="text"],
        input[type="password"] {
          font-size: 14px;
          padding: 12px 14px;
        }

        button {
          font-size: 14px;
          padding: 12px 20px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a href="/"
        >afterthe<span class="highlight">#</span></a
      >
    </header>

    <div id="app">
      <div id="encrypt">
        <div id="encrypt-create">
          <h1>Encrypt an image</h1>
          <form id="encrypt-create-form">
            <div>
              <div class="help-text">Choose an image</div>
              <input
                id="encrypt-create-images"
                type="file"
                accept="image/*"
              />
            </div>
            <div id="encrypt-create-compress" class="compress-panel" hidden>
              <div class="compress-row">
                <label for="encrypt-create-quality">Quality</label>
                <input
                  type="range"
                  id="encrypt-create-quality"
                  min="0.1"
                  max="1"
                  step="0.05"
                  value="0.7"
                />
                <span id="encrypt-create-quality-val" class="compress-val"
                  >0.70</span
                >
              </div>
              <div class="compress-row">
                <label for="encrypt-create-maxdim">Max size</label>
                <input
                  type="range"
                  id="encrypt-create-maxdim"
                  min="64"
                  max="4096"
                  step="64"
                  value="1280"
                />
                <span id="encrypt-create-maxdim-val" class="compress-val"
                  >1280px</span
                >
              </div>
              <div id="encrypt-create-compress-stats" class="compress-stats"></div>
              <div
                id="encrypt-create-compress-status"
                class="compress-status"
              ></div>
              <div
                id="encrypt-create-compress-note"
                class="compress-note"
              ></div>
            </div>
            <div>
              <div class="help-text">Password to encrypt with</div>
              <input
                id="encrypt-create-password"
                type="password"
                placeholder="Enter a strong password..."
              />
            </div>
            <button type="submit" id="encrypt-create-submit">
              Encrypt & Create Link
            </button>
          </form>
        </div>
        <div id="encrypt-success">
          <h1>Encrypted image created</h1>
          <div class="help-text">
            Share this link - the encrypted data is in the URL
          </div>
          <div class="success-container">
            <input
              type="text"
              disabled
              id="encrypt-success-url"
              value="https://afterthehash.vercel.app/image-v1.html#v1:ABC123..."
            />
            <button type="button" id="encrypt-success-copy">Copy Link</button>
          </div>
          <a id="encrypt-success-open" class="open-link" href="#">Open it here →</a>
          <div id="encrypt-success-size-note" class="size-note"></div>
        </div>
      </div>
      <div id="decrypt">
        <div id="decrypt-locked">
          <h1>Unlock encrypted image</h1>
          <form id="decrypt-locked-form">
            <div>
              <div class="help-text">Enter the password to decrypt</div>
              <input
                id="decrypt-locked-password"
                type="password"
                placeholder="Enter password..."
              />
            </div>
            <button type="submit" id="decrypt-locked-submit">Decrypt</button>
            <div id="decrypt-locked-error"></div>
          </form>
        </div>
        <div id="decrypt-unlocked">
          <h1>Decrypted image</h1>
          <div id="decrypt-unlocked-images" class="image-viewer"></div>
        </div>
      </div>
    </div>

    <script>
      // ==================== STATE MACHINE ====================
      const STATES = {
        ENCRYPT_CREATE: "encrypt-create",
        ENCRYPT_SUCCESS: "encrypt-success",
        DECRYPT_LOCKED: "decrypt-locked",
        DECRYPT_UNLOCKED: "decrypt-unlocked",
      };

      let currentState = null;

      function setState(newState) {
        // Remove active class from all sections
        document.querySelectorAll(".active").forEach((el) => {
          el.classList.remove("active");
        });

        currentState = newState;

        // Add active class to current state elements and focus appropriate field
        switch (newState) {
          case STATES.ENCRYPT_CREATE:
            document.getElementById("encrypt").classList.add("active");
            document.getElementById("encrypt-create").classList.add("active");
            document.getElementById("encrypt-create-images").focus();
            break;
          case STATES.ENCRYPT_SUCCESS:
            document.getElementById("encrypt").classList.add("active");
            document.getElementById("encrypt-success").classList.add("active");
            document.getElementById("encrypt-success-copy").focus();
            break;
          case STATES.DECRYPT_LOCKED:
            document.getElementById("decrypt").classList.add("active");
            document.getElementById("decrypt-locked").classList.add("active");
            document.getElementById("decrypt-locked-password").focus();
            break;
          case STATES.DECRYPT_UNLOCKED:
            document.getElementById("decrypt").classList.add("active");
            document.getElementById("decrypt-unlocked").classList.add("active");
            break;
        }
      }

      function determineInitialState() {
        const hash = window.location.hash;

        if (hash && hash.startsWith("#v1:")) {
          return STATES.DECRYPT_LOCKED;
        } else {
          return STATES.ENCRYPT_CREATE;
        }
      }

      // ==================== CRYPTO UTILITIES ====================
      function assert(condition, message) {
        if (!condition) {
          throw new Error(message);
        }
      }

      function strToArrayBuffer(str) {
        const encoder = new TextEncoder();
        return encoder.encode(str);
      }

      function arrayBufferToString(buffer) {
        const decoder = new TextDecoder();
        return decoder.decode(buffer);
      }

      function arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        // Chunk to avoid blowing the call stack on large (image) payloads.
        let binary = "";
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
        }
        return btoa(binary);
      }

      function base64ToArrayBuffer(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
      }

      async function deriveKey(password, salt) {
        const passwordKey = await crypto.subtle.importKey(
          "raw",
          strToArrayBuffer(password),
          "PBKDF2",
          false,
          ["deriveKey"],
        );

        return crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt: salt,
            iterations: 100000,
            hash: "SHA-256",
          },
          passwordKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["encrypt", "decrypt"],
        );
      }

      async function encrypt(text, password) {
        assert(password, "Password is required");
        assert(text, "Text is required");
        assert(typeof text === "string", "Text must be a string");
        assert(typeof password === "string", "Password must be a string");

        try {
          const salt = crypto.getRandomValues(new Uint8Array(16));
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const key = await deriveKey(password, salt);

          const encrypted = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            strToArrayBuffer(text),
          );

          const combined = new Uint8Array(
            salt.length + iv.length + encrypted.byteLength,
          );
          combined.set(salt, 0);
          combined.set(iv, salt.length);
          combined.set(new Uint8Array(encrypted), salt.length + iv.length);

          return {
            ok: true,
            data: arrayBufferToBase64(combined.buffer),
          };
        } catch (error) {
          console.error("Encryption error:", error);
          return { ok: false, error: error.message };
        }
      }

      async function decrypt(encryptedData, password) {
        assert(password, "Password is required");
        assert(encryptedData, "Encrypted data is required");
        assert(
          typeof encryptedData === "string",
          "Encrypted data must be a string",
        );
        assert(typeof password === "string", "Password must be a string");

        try {
          const combined = new Uint8Array(base64ToArrayBuffer(encryptedData));

          const salt = combined.slice(0, 16);
          const iv = combined.slice(16, 28);
          const encrypted = combined.slice(28);

          const key = await deriveKey(password, salt);

          const decrypted = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            encrypted,
          );

          return {
            ok: true,
            data: arrayBufferToString(decrypted),
          };
        } catch (error) {
          return { ok: false, error: error.message };
        }
      }

      // ==================== IMAGE HANDLING ====================
      // The image to encrypt, held as a (compressed) data URL until encrypted.
      // Kept as an array so the payload stays { v: 1, images: [...] }.
      let selectedImages = [];

      // Compression runs entirely on-device via <canvas> — nothing is uploaded.
      // The sender tunes quality / max dimension and sees the resulting link
      // size live before creating the link.
      let originalBitmap = null;
      let compressTimer = null;

      // WebP compresses better than JPEG and keeps transparency, but canvas
      // WebP encoding isn't universal (e.g. Safari falls back to PNG). Detect
      // support once; otherwise encode JPEG.
      const OUTPUT_TYPE = (() => {
        const c = document.createElement("canvas");
        c.width = c.height = 1;
        return c.toDataURL("image/webp").startsWith("data:image/webp")
          ? "image/webp"
          : "image/jpeg";
      })();

      const NAV_LIMIT = 2 * 1024 * 1024; // Chromium navigation limit (clicked)
      // Address-bar PASTE truncates long URLs, and the cutoff is
      // browser-specific and not reliably knowable: Brave kept ~598,700 chars
      // in one test, but other builds silently truncate a ~524,000-char paste.
      // Typing caps far lower (~32 KB) but nobody types these. CLICKING has no
      // such limit (works to NAV_LIMIT) — that's the reliable path, and the
      // success screen always offers a clickable link. So treat paste as safe
      // only for clearly-small links and steer everything larger to clicking.
      const PASTE_LIMIT = 262144;

      function readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(reader.error);
          reader.readAsDataURL(file);
        });
      }

      // Estimate the final link length (chars) for an image data URL, mirroring
      // the encrypt pipeline: JSON-wrap, prepend salt+iv, append the GCM tag,
      // then base64-encode the whole thing.
      function estimateLinkChars(dataUrl) {
        const jsonBytes = dataUrl.length + 21; // {"v":1,"images":["…"]}
        const combinedBytes = jsonBytes + 44; // salt 16 + iv 12 + GCM tag 16
        const base64Len = Math.ceil(combinedBytes / 3) * 4;
        const prefix = (location.origin + location.pathname + "#v1:").length;
        return base64Len + prefix;
      }

      function formatKb(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        const kb = bytes / 1024;
        return kb < 1024
          ? `${kb.toFixed(kb < 100 ? 1 : 0)} KB`
          : `${(kb / 1024).toFixed(1)} MB`;
      }

      async function handleImageSelect(e) {
        const file = (e.target.files || [])[0];
        const panel = document.getElementById("encrypt-create-compress");

        if (originalBitmap) {
          originalBitmap.close?.();
          originalBitmap = null;
        }

        if (!file) {
          selectedImages = [];
          panel.hidden = true;
          return;
        }

        try {
          originalBitmap = await createImageBitmap(file, {
            imageOrientation: "from-image",
          });
        } catch (_) {
          // Some formats (e.g. SVG) can't be decoded to a bitmap — fall back to
          // encrypting the original file uncompressed, with no controls.
          const dataUrl = await readFileAsDataURL(file);
          selectedImages = [dataUrl];
          panel.hidden = true;
          return;
        }

        // Never upscale: cap the "max size" slider at the source's longest side.
        const longest = Math.max(originalBitmap.width, originalBitmap.height);
        const maxInput = document.getElementById("encrypt-create-maxdim");
        maxInput.max = longest;
        if (Number(maxInput.value) > longest) maxInput.value = longest;

        panel.hidden = false;
        handleCompressInput(); // sync the value labels, then compress
      }

      async function recompress() {
        if (!originalBitmap) return;

        const quality = Number(
          document.getElementById("encrypt-create-quality").value,
        );
        const longest = Math.max(originalBitmap.width, originalBitmap.height);
        const maxDim = Math.min(
          Number(document.getElementById("encrypt-create-maxdim").value),
          longest,
        );
        const scale = longest > maxDim ? maxDim / longest : 1;
        const w = Math.max(1, Math.round(originalBitmap.width * scale));
        const h = Math.max(1, Math.round(originalBitmap.height * scale));

        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        // JPEG has no alpha; flatten onto white so transparency isn't black.
        if (OUTPUT_TYPE === "image/jpeg") {
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, w, h);
        }
        ctx.drawImage(originalBitmap, 0, 0, w, h);

        const dataUrl = canvas.toDataURL(OUTPUT_TYPE, quality);
        selectedImages = [dataUrl];
        updateCompressReadout(dataUrl, w, h);
      }

      function updateCompressReadout(dataUrl, w, h) {
        const imageBytes = Math.round(
          (dataUrl.length - dataUrl.indexOf(",") - 1) * 0.75,
        );
        const linkChars = estimateLinkChars(dataUrl);

        document.getElementById(
          "encrypt-create-compress-stats",
        ).textContent = `${w}×${h} · ${formatKb(imageBytes)} image · ${formatKb(
          linkChars,
        )} link`;

        const status = document.getElementById("encrypt-create-compress-status");
        const note = document.getElementById("encrypt-create-compress-note");
        status.classList.remove("good", "warn", "bad");

        if (linkChars > NAV_LIMIT) {
          status.classList.add("bad");
          status.textContent = "✗ Too large to open in Brave/Chrome";
          note.textContent =
            "Lower the quality or max size to bring the link under 2 MB.";
        } else if (linkChars > PASTE_LIMIT) {
          status.classList.add("warn");
          status.textContent = "✓ Opens when you click the link";
          note.textContent =
            "Avoid pasting or typing a link this long into the address bar — it can get truncated and break. Clicking the link always works.";
        } else {
          status.classList.add("good");
          status.textContent = "✓ Opens anywhere — paste or click";
          note.textContent =
            "Small enough to paste into the address bar or open by clicking.";
        }
      }

      function handleCompressInput() {
        document.getElementById("encrypt-create-quality-val").textContent =
          Number(
            document.getElementById("encrypt-create-quality").value,
          ).toFixed(2);
        document.getElementById(
          "encrypt-create-maxdim-val",
        ).textContent = `${document.getElementById("encrypt-create-maxdim").value}px`;
        clearTimeout(compressTimer);
        compressTimer = setTimeout(recompress, 80);
      }

      // Blob URLs created for the current view, so we can release them when
      // the view is re-rendered.
      let viewerObjectUrls = [];

      // Base64 data URLs are ~33% larger than the raw bytes and live entirely
      // in the JS heap / DOM string. For large images a Blob URL is far lighter
      // and displays identically — it's the same kind of URL the browser's own
      // image viewer uses.
      function dataUrlToBlobUrl(dataUrl) {
        const comma = dataUrl.indexOf(",");
        const mime = (/^data:([^;,]+)/.exec(dataUrl) || [])[1] || "image/png";
        const binary = atob(dataUrl.slice(comma + 1));
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return URL.createObjectURL(new Blob([bytes], { type: mime }));
      }

      function renderDecrypted(data) {
        const imagesEl = document.getElementById("decrypt-unlocked-images");
        imagesEl.replaceChildren();

        // Release blob URLs from any previous render.
        for (const url of viewerObjectUrls) URL.revokeObjectURL(url);
        viewerObjectUrls = [];

        let images = [];
        try {
          const parsed = JSON.parse(data);
          if (parsed && parsed.v === 1 && Array.isArray(parsed.images)) {
            images = parsed.images;
          }
        } catch (_) {
          // Malformed payload — leave the viewer empty.
        }

        for (const dataUrl of images) {
          let src = dataUrl;
          try {
            src = dataUrlToBlobUrl(dataUrl);
            viewerObjectUrls.push(src);
          } catch (_) {
            // Fall back to the data URL if it isn't valid base64.
          }

          const img = document.createElement("img");
          img.src = src;
          img.alt = "Decrypted image";
          // Click toggles between fit-to-window and full (native) size, like
          // the browser's native image viewer.
          img.addEventListener("click", () => img.classList.toggle("full"));
          imagesEl.appendChild(img);
        }
      }

      // ==================== EVENT HANDLERS ====================
      async function handleEncryptSubmit(e) {
        e.preventDefault();

        const password = document.getElementById(
          "encrypt-create-password",
        ).value;

        if (selectedImages.length === 0 || !password) {
          alert("Please choose an image and enter a password");
          return;
        }

        // Package images into a single structured payload.
        const payload = JSON.stringify({
          v: 1,
          images: selectedImages,
        });

        const result = await encrypt(payload, password);

        if (result.ok) {
          const url = `${window.location.origin}${window.location.pathname}#v1:${result.data}`;
          document.getElementById("encrypt-success-url").value = url;

          // Clicking this anchor navigates in-page to the hash (reliable up to
          // the ~2 MB navigation limit), so the user never has to paste a huge
          // URL into the address bar — where it can be silently truncated.
          document.getElementById("encrypt-success-open").href = url;

          // Warn when the link grows large enough to hit browser/URL limits.
          const sizeNote = document.getElementById("encrypt-success-size-note");
          if (url.length > 30000) {
            sizeNote.textContent = `Heads up: this link is ${Math.round(
              url.length / 1024,
            )} KB. Very large images can exceed what browsers or chat apps allow in a URL.`;
          } else {
            sizeNote.textContent = "";
          }

          // Don't navigate to the hash, just show the success state
          setState(STATES.ENCRYPT_SUCCESS);
        } else {
          alert(`Encryption failed: ${result.error}`);
        }
      }

      async function handleDecryptSubmit(e) {
        e.preventDefault();

        const password = document.getElementById(
          "decrypt-locked-password",
        ).value;
        const hash = window.location.hash;

        if (!password) {
          document.getElementById("decrypt-locked-error").textContent =
            "Please enter a password";
          return;
        }

        if (!hash || !hash.startsWith("#v1:")) {
          document.getElementById("decrypt-locked-error").textContent =
            "Invalid encrypted data in URL";
          return;
        }

        const encryptedData = hash.substring(4); // Remove "#v1:"
        const result = await decrypt(encryptedData, password);

        if (result.ok) {
          document.getElementById("decrypt-locked-error").textContent = "";
          renderDecrypted(result.data);
          setState(STATES.DECRYPT_UNLOCKED);
        } else {
          document.getElementById("decrypt-locked-error").textContent =
            "Incorrect password or corrupted data";
        }
      }

      function handleCopyClick() {
        const urlInput = document.getElementById("encrypt-success-url");
        urlInput.select();
        navigator.clipboard.writeText(urlInput.value);

        const button = document.getElementById("encrypt-success-copy");
        const originalText = button.textContent;
        button.textContent = "Copied!";
        setTimeout(() => {
          button.textContent = originalText;
        }, 2000);
      }

      function handleHashChange() {
        const newState = determineInitialState();
        setState(newState);

        // Clear decrypt password and error when navigating back to decrypt
        if (newState === STATES.DECRYPT_LOCKED) {
          document.getElementById("decrypt-locked-password").value = "";
          document.getElementById("decrypt-locked-error").textContent = "";
        }
      }

      // ==================== INITIALIZATION ====================
      document.addEventListener("DOMContentLoaded", () => {
        // Wire up event listeners
        document
          .getElementById("encrypt-create-form")
          .addEventListener("submit", handleEncryptSubmit);

        document
          .getElementById("encrypt-create-images")
          .addEventListener("change", handleImageSelect);

        document
          .getElementById("encrypt-create-quality")
          .addEventListener("input", handleCompressInput);

        document
          .getElementById("encrypt-create-maxdim")
          .addEventListener("input", handleCompressInput);

        document
          .getElementById("decrypt-locked-form")
          .addEventListener("submit", handleDecryptSubmit);

        document
          .getElementById("encrypt-success-copy")
          .addEventListener("click", handleCopyClick);

        window.addEventListener("hashchange", handleHashChange);

        // Set initial state
        setState(determineInitialState());
      });
    </script>
  </body>
</html>
